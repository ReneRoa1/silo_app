[server]
headless = true
enableCORS = false
enableXsrfProtection = false

[browser]
gatherUsageStats = false

[global]
developmentMode = false

[theme]
primaryColor = "#1c93c6"
backgroundColor = "#f7f9fc"
secondaryBackgroundColor = "#ffffff"
textColor = "#1f2937"
font = "sans serif"

[theme.dark]
primaryColor = "#1c93c6"
backgroundColor = "#0b1220"
secondaryBackgroundColor = "#182235"
textColor = "#e5e7eb"
font = "sans serif"

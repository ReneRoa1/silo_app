services:
  - type: web
    name: silo-app
    runtime: python
    buildCommand: pip install -r silo_app/requirements.txt
    startCommand: streamlit run silo_app/app/main.py --server.port $PORT --server.address 0.0.0.0
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"

